<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bistro Cloud</title>
  <script>
    // GitHub Pages SPA redirect
    // When a 404 is hit (e.g. /catering), save the path and redirect to root  
    // The main app picks up the path from sessionStorage and navigates
    var l = window.location;
    sessionStorage.setItem('spa-redirect', l.pathname + l.search + l.hash);
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/'
    );
  </script>
</head>
<body>
</body>
</html>
