<!DOCTYPE html>
<html>
<head>
  <title>Bistro Cloud CRM Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    .test { margin: 15px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .status { font-weight: bold; }
    .pending { color: orange; }
    .success { color: green; }
    .fail { color: red; }
    button { background: #D94E28; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    h1 { color: #2C3E50; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
  </style>
</head>
<body>
  <h1>CRM Endpoint Diagnostic</h1>
  <p>Click the button to test all CRM submission strategies from your browser.</p>
  <button onclick="runTests()">Run CRM Tests</button>
  <div id="results"></div>

  <script>
    const CRM = 'https://script.google.com/macros/s/AKfycbzN-s2iKeyjIC_k-wyNzj6QHOO5eoW14EqWo7fC4kYzYzqyMOygZpCDPpyqPVxhFA/exec';

    function log(id, msg, cls) {
      document.getElementById(id).innerHTML += '<div class="' + cls + '">' + msg + '</div>';
    }

    async function runTests() {
      const payload = JSON.stringify({
        formType: 'order',
        data: {
          name: 'Browser Diagnostic Test',
          phone: '+20-BROWSER-TEST',
          address: 'Diagnostic page',
          deliveryArea: 'El Gouna',
          orderTotal: 1,
          orderSummary: '1x Diagnostic Test (1 EGP)'
        },
        timestamp: new Date().toISOString()
      });

      const url = CRM + '?payload=' + encodeURIComponent(payload);

      document.getElementById('results').innerHTML = `
        <pre>URL length: ${url.length} chars</pre>
        <div class="test" id="t1"><h3>Test 1: Script Tag</h3></div>
        <div class="test" id="t2"><h3>Test 2: Link Prefetch</h3></div>
        <div class="test" id="t3"><h3>Test 3: Fetch no-cors</h3></div>
        <div class="test" id="t4"><h3>Test 4: Fetch cors</h3></div>
        <div class="test" id="t5"><h3>Test 5: Image Tag</h3></div>
        <div class="test" id="t6"><h3>Test 6: Iframe</h3></div>
      `;

      // Test 1: Script tag
      try {
        log('t1', 'Creating script tag...', 'pending');
        const script = document.createElement('script');
        script.onload = () => log('t1', 'ONLOAD fired (request completed)', 'success');
        script.onerror = () => log('t1', 'ONERROR fired (request completed, JSON not valid JS - this is EXPECTED and means it WORKED)', 'success');
        script.src = url;
        document.body.appendChild(script);
        log('t1', 'Script tag appended to body, waiting...', 'pending');
        setTimeout(() => log('t1', '10s timeout reached', 'pending'), 10000);
      } catch (e) {
        log('t1', 'ERROR: ' + e.message, 'fail');
      }

      // Test 2: Link prefetch
      try {
        log('t2', 'Creating link prefetch...', 'pending');
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = url;
        link.onload = () => log('t2', 'ONLOAD fired', 'success');
        link.onerror = () => log('t2', 'ONERROR fired', 'fail');
        document.head.appendChild(link);
        log('t2', 'Link appended to head, waiting...', 'pending');
      } catch (e) {
        log('t2', 'ERROR: ' + e.message, 'fail');
      }

      // Test 3: Fetch no-cors
      try {
        log('t3', 'Sending fetch (no-cors)...', 'pending');
        const r = await fetch(url, { method: 'GET', mode: 'no-cors', credentials: 'omit' });
        log('t3', 'Response type: ' + r.type + ', status: ' + r.status, r.type === 'opaque' ? 'pending' : 'success');
        log('t3', 'Note: opaque = request sent but cannot read response (normal for no-cors)', 'pending');
      } catch (e) {
        log('t3', 'FETCH ERROR: ' + e.message, 'fail');
      }

      // Test 4: Fetch cors
      try {
        log('t4', 'Sending fetch (cors, follow redirects)...', 'pending');
        const r = await fetch(url, { method: 'GET', mode: 'cors', redirect: 'follow', credentials: 'omit' });
        const text = await r.text();
        log('t4', 'Status: ' + r.status + ' Response: ' + text, 'success');
      } catch (e) {
        log('t4', 'FETCH ERROR: ' + e.message, 'fail');
      }

      // Test 5: Image tag
      try {
        log('t5', 'Creating img tag...', 'pending');
        const img = new Image();
        img.onload = () => log('t5', 'ONLOAD fired', 'success');
        img.onerror = () => log('t5', 'ONERROR fired (expected for JSON response - request was still made)', 'success');
        img.src = url;
        document.body.appendChild(img);
        log('t5', 'Image appended, waiting...', 'pending');
      } catch (e) {
        log('t5', 'ERROR: ' + e.message, 'fail');
      }

      // Test 6: Iframe
      try {
        log('t6', 'Creating iframe...', 'pending');
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.onload = () => log('t6', 'ONLOAD fired', 'success');
        iframe.onerror = () => log('t6', 'ONERROR fired', 'fail');
        iframe.src = url;
        document.body.appendChild(iframe);
        log('t6', 'Iframe appended, waiting...', 'pending');
      } catch (e) {
        log('t6', 'ERROR: ' + e.message, 'fail');
      }
    }
  </script>
</body>
</html>
